server:
  port: 8080

spring:
  # R2DBC - fully non-blocking postgres
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/leaderboard}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin123}

  # Flyway needs JDBC for migrations (R2DBC doesn't support migrations)
  datasource:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/leaderboard}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin123}

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Reactive Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

leaderboard:
  # How long a contest's leaderboard stays in Redis after it ends
  cache-ttl-hours: 48
  # Max entries to return in leaderboard view
  max-entries: 100
